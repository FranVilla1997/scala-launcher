<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCALA — Developer Hub</title>
  <style>
    @font-face {
      font-family: 'Venn';
      src: url('LEAK-DETECTOR/Venn_Trial_Bd.ttf') format('truetype');
      font-weight: 700;
    }

    :root {
      --bg:           #0a0b0f;
      --surface1:     #111318;
      --surface2:     #191c23;
      --surface3:     #1f2330;
      --blue:         #4f8ef7;
      --blue-light:   #7aabff;
      --green:        #4ade80;
      --purple:       #a78bfa;
      --text-primary: #e8eaf0;
      --text-muted:   #8b90a0;
      --text-subtle:  #555b6e;
      --border:       rgba(255,255,255,0.07);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 48px 32px 64px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 15% -5%, rgba(79,142,247,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 700px 500px at 85% 105%, rgba(74,222,128,0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 52px;
    }

    .logo { display: flex; align-items: center; }
    .logo svg { height: 26px; width: auto; }

    .vr {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    .header-meta { flex: 1; }
    .header-meta .tagline {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .header-clock {
      font-size: 13px;
      color: var(--text-subtle);
      font-variant-numeric: tabular-nums;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-subtle);
      margin-bottom: 16px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface1);
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    .card:hover {
      border-color: rgba(255,255,255,0.11);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 16px 16px 0 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-icon {
      width: 42px; height: 42px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .status-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--text-subtle);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.online  { background: var(--green);  box-shadow: 0 0 8px rgba(74,222,128,0.5); }
    .dot.offline { background: #ef4444; }
    .dot.checking { background: var(--blue); animation: blink 1.1s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .dot-label {
      font-size: 10px;
      color: var(--text-subtle);
      white-space: nowrap;
    }
    .dot-label.online  { color: var(--green); }
    .dot-label.offline { color: #ef4444; }
    .dot-label.checking { color: var(--blue); }

    /* ── Card footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-subtle);
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
      min-width: 0;
    }

    .badge-type {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text-subtle);
    }

    .spacer { flex: 1; }

    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: filter 0.15s, opacity 0.15s;
      white-space: nowrap;
      color: white;
      flex-shrink: 0;
    }
    .btn-open:hover { filter: brightness(1.15); }
    .btn-open.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-subtle);
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-refresh:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.15);
    }

    .spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 503.39 64.59">
        <style>.s{fill:#fff}</style>
        <polygon class="s" points="136.57 64.47 0 64.45 .03 50.57 136.62 50.54 136.57 64.47"/>
        <polygon class="s" points="136.75 39.63 25.06 39.65 25.01 25.44 136.47 25.34 136.75 39.63"/>
        <polygon class="s" points="136.56 14.66 49.79 14.6 49.85 .05 136.53 0 136.56 14.66"/>
        <path class="s" d="M224.78,58.22c-9.68,9.71-36.53,6.03-49.37,3.74v-9.16c7.62.77,39.99,7.07,40.34-3.76.07-2.21-1.67-4.85-4.26-5.3l-18.47-3.26c-8.95-1.58-19.62-3.57-18.56-15.63.42-4.77,2.4-8.71,6.92-10.87,11.97-5.71,29.83-3.15,42.75-1.18l-.11,9.28c-7.47-.49-38.06-6.95-37.44,3.85.09,1.53,2.01,3.87,3.86,4.19l20.5,3.51c4.38.75,9.12,1.81,12.65,4.66,5.91,4.77,6.54,14.55,1.18,19.93z"/>
        <path class="s" d="M452.71,53.03l-6.29,10.78-12.56-.07,20.77-38.33,7.96-13.79,11.87-.12,28.93,52.24-12.69.11-6.13-10.74-31.86-.08zM479.67,43.9l-11.1-21.1-11.35,21.16,22.45-.06z"/>
        <path class="s" d="M351.11,53.12l-31.72-.14-5.86,10.71-12.5-.18,28.07-51.91,12.03-.07,28.66,52.1-12.62.41-6.05-10.92zM346.23,43.73l-11.13-20.83-11.23,21.01,22.36-.18z"/>
        <path class="s" d="M253.73,49.21c4.76,8.62,29.91,5.79,38.89,3.85l.18,9.25c-13.77,2.98-44.23,5.42-51.32-10.24-4.22-9.31-4.07-21.28.83-30.34,7.63-14.1,36.78-11.73,50.25-9.28l.21,9.36c-8.67-1.38-33.94-4.97-39.05,4.15-3.87,6.9-3.8,16.35.01,23.24z"/>
        <polygon class="s" points="426.75 54.9 426.79 63.95 379.79 63.91 379.8 11.69 391.57 11.47 391.53 54.85 426.75 54.9"/>
      </svg>
    </div>
    <div class="vr"></div>
    <div class="header-meta">
      <div class="tagline">Developer Hub</div>
    </div>
    <div class="header-clock" id="clock">—</div>
  </header>

  <p class="section-label">Aplicaciones</p>

  <!-- Cards grid -->
  <div class="grid" id="grid"></div>

  <!-- Footer -->
  <footer>
    <span id="last-check">Verificando servicios...</span>
    <button class="btn-refresh" id="refresh-btn" onclick="checkAll()">
      <span id="refresh-icon">↺</span>
      Actualizar estado
    </button>
  </footer>

</div>

<script>
  const APPS = [
    {
      name: 'Leads Scraper',
      desc: 'Scraper de negocios en Google Maps con extracción de emails y almacenamiento en Supabase.',
      url: 'https://scala-leads-scraper.vercel.app/',
      host: 'scala-leads-scraper.vercel.app',
      checkUrl: 'https://scala-leads-scraper.vercel.app/',
      icon: '🔍',
      color: '#4f8ef7',
      type: 'Frontend',
    },
    {
      name: 'Leads API',
      desc: 'Backend FastAPI para búsqueda, scraping y gestión de leads. Incluye docs interactivos.',
      url: 'https://api.scalaops.online/api/leads',
      host: 'api.scalaops.online',
      checkUrl: 'https://api.scalaops.online/api/leads',
      icon: '⚙️',
      color: '#7aabff',
      type: 'Backend',
    },
    {
      name: 'Projects Tracker',
      desc: 'Seguimiento de proyectos, tareas y estado operativo del equipo Scala.',
      url: 'https://scala-tracker-next.vercel.app/',
      host: 'scala-tracker-next.vercel.app',
      checkUrl: 'https://scala-tracker-next.vercel.app/',
      icon: '📋',
      color: '#4ade80',
      type: 'Frontend',
    },
    {
      name: 'Leak Detector',
      desc: 'Diagnóstico de fugas en el proceso de ventas: detecta dónde se pierden los leads.',
      url: 'https://scala-leak-detector.vercel.app/',
      host: 'scala-leak-detector.vercel.app',
      checkUrl: 'https://scala-leak-detector.vercel.app/',
      icon: '🔎',
      color: '#f97316',
      type: 'Frontend',
    },
    {
      name: 'Chat Webapp',
      desc: 'Interfaz de chat para vendedores y clientes usando SENTINEL.',
      url: "https://chat-webapp-796p.vercel.app/",
      host: 'chat-webapp-796p.vercel.app',
      checkUrl: "https://chat-webapp-796p.vercel.app/",
      icon: '💬',
      color: '#a78bfa',
      type: 'Frontend',
    },    
    {
      name: 'Mundial Landing Page',
      desc: 'SENTINEL Mundialista EEUU',
      url: "https://public-xi-ruddy.vercel.app/",
      host: 'Próximamente',
      checkUrl: "public-xi-ruddy.vercel.app/",
      icon: '🌍',
      color: '#a78bfa',
      type: 'Frontend',
      soon: false,
    },
        {
      name: 'SCALA Call Center',
      desc: 'Central de llamadas para vendedores',
      url: "https://public-xi-ruddy.vercel.app/",
      host: 'Próximamente',
      checkUrl: "public-xi-ruddy.vercel.app/",
      icon: '📲',
      color: '#a78bfa',
      type: 'Frontend',
      soon: true,
    },
      {
      name: 'SCALA CRM',
      desc: 'CRM Integral que conecta todas las herramientas',
      url: "https://public-xi-ruddy.vercel.app/",
      host: 'Próximamente',
      checkUrl: "public-xi-ruddy.vercel.app/",
      icon: '📲',
      color: '#a78bfa',
      type: 'Frontend',
      soon: true,
    },
  ];

  // Render cards
  const grid = document.getElementById('grid');
  APPS.forEach((app, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;
    if (app.soon) {
      card.innerHTML = `
        <div class="card-stripe" style="background:linear-gradient(90deg,${app.color}40,transparent)"></div>
        <div class="card-top">
          <div class="card-icon" style="background:${app.color}0d;border:1px solid ${app.color}18;opacity:0.55">${app.icon}</div>
          <div class="card-info">
            <div class="card-name" style="opacity:0.5">${app.name}</div>
            <div class="card-desc" style="opacity:0.45">${app.desc}</div>
          </div>
          <div class="status-indicator">
            <div class="dot" style="background:#555b6e"></div>
            <span class="dot-label">Pronto</span>
          </div>
        </div>
        <div class="card-footer">
          <span class="badge" style="opacity:0.4">${app.host}</span>
          <span class="badge-type" style="opacity:0.4">${app.type}</span>
          <div class="spacer"></div>
          <span class="btn-open disabled" style="background:${app.color};opacity:0.25">Abrir →</span>
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="card-stripe" style="background:linear-gradient(90deg,${app.color}90,transparent)"></div>
        <div class="card-top">
          <div class="card-icon" style="background:${app.color}15;border:1px solid ${app.color}28">${app.icon}</div>
          <div class="card-info">
            <div class="card-name">${app.name}</div>
            <div class="card-desc">${app.desc}</div>
          </div>
          <div class="status-indicator">
            <div class="dot checking" id="dot-${i}"></div>
            <span class="dot-label checking" id="dotlabel-${i}">...</span>
          </div>
        </div>
        <div class="card-footer">
          <span class="badge" style="font-size:10px">${app.host}</span>
          <span class="badge-type">${app.type}</span>
          <div class="spacer"></div>
          <a href="${app.url}" target="_blank" class="btn-open disabled" id="btn-${i}" style="background:${app.color}">
            Abrir →
          </a>
        </div>
      `;
    }
    grid.appendChild(card);
  });

  // Check each service
  async function checkService(app, i) {
    if (app.soon) return;

    const dot      = document.getElementById(`dot-${i}`);
    const dotlabel = document.getElementById(`dotlabel-${i}`);
    const btn      = document.getElementById(`btn-${i}`);

    dot.className      = 'dot checking';
    dotlabel.className = 'dot-label checking';
    dotlabel.textContent = '...';

    try {
      const ctrl    = new AbortController();
      const timer   = setTimeout(() => ctrl.abort(), 5000);
      await fetch(app.checkUrl, { mode: 'no-cors', signal: ctrl.signal });
      clearTimeout(timer);

      dot.className      = 'dot online';
      dotlabel.className = 'dot-label online';
      dotlabel.textContent = 'Online';
      btn.classList.remove('disabled');
    } catch {
      dot.className      = 'dot offline';
      dotlabel.className = 'dot-label offline';
      dotlabel.textContent = 'Offline';
      btn.classList.add('disabled');
    }
  }

  let checking = false;
  function checkAll() {
    if (checking) return;
    checking = true;
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('spinning');
    APPS.forEach((app, i) => checkService(app, i));
    Promise.allSettled(APPS.map((app, i) => checkService(app, i))).then(() => {
      checking = false;
      icon.classList.remove('spinning');
      document.getElementById('last-check').textContent =
        'Última verificación: ' + new Date().toLocaleTimeString('es-AR');
    });
  }

  // Clock
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(tick, 1000);
  tick();

  // Boot
  checkAll();
  setInterval(checkAll, 30000);
</script>
</body>
</html>
